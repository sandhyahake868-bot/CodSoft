<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calcite — Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Ambient background orbs -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <main class="calculator-wrapper">

    <!-- Branding -->
    <header class="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">Calcite</span>
    </header>

    <!-- Calculator card -->
    <div class="calculator" role="application" aria-label="Calculator">

      <!-- Display -->
      <div class="display" aria-live="polite">
        <div class="expression" id="expression" aria-label="Expression"></div>
        <div class="result" id="result" aria-label="Result">0</div>
      </div>

      <!-- Keypad -->
      <div class="keypad">

        <!-- Row 1: AC, ±, %, ÷ -->
        <button class="btn btn-fn" data-action="clear" aria-label="All Clear">AC</button>
        <button class="btn btn-fn" data-action="sign" aria-label="Toggle Sign">±</button>
        <button class="btn btn-fn" data-action="percent" aria-label="Percent">%</button>
        <button class="btn btn-op" data-action="operator" data-value="÷" aria-label="Divide">÷</button>

        <!-- Row 2: 7, 8, 9, × -->
        <button class="btn btn-num" data-action="number" data-value="7" aria-label="7">7</button>
        <button class="btn btn-num" data-action="number" data-value="8" aria-label="8">8</button>
        <button class="btn btn-num" data-action="number" data-value="9" aria-label="9">9</button>
        <button class="btn btn-op" data-action="operator" data-value="×" aria-label="Multiply">×</button>

        <!-- Row 3: 4, 5, 6, − -->
        <button class="btn btn-num" data-action="number" data-value="4" aria-label="4">4</button>
        <button class="btn btn-num" data-action="number" data-value="5" aria-label="5">5</button>
        <button class="btn btn-num" data-action="number" data-value="6" aria-label="6">6</button>
        <button class="btn btn-op" data-action="operator" data-value="−" aria-label="Subtract">−</button>

        <!-- Row 4: 1, 2, 3, + -->
        <button class="btn btn-num" data-action="number" data-value="1" aria-label="1">1</button>
        <button class="btn btn-num" data-action="number" data-value="2" aria-label="2">2</button>
        <button class="btn btn-num" data-action="number" data-value="3" aria-label="3">3</button>
        <button class="btn btn-op" data-action="operator" data-value="+" aria-label="Add">+</button>

        <!-- Row 5: 0 (wide), ., ⌫, = -->
        <button class="btn btn-num btn-zero" data-action="number" data-value="0" aria-label="0">0</button>
        <button class="btn btn-num" data-action="decimal" aria-label="Decimal point">.</button>
        <button class="btn btn-fn" data-action="delete" aria-label="Delete last character">⌫</button>
        <button class="btn btn-eq" data-action="equals" aria-label="Equals">=</button>

      </div>

      <!-- Keyboard hint -->
      <p class="hint">Keyboard supported</p>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
